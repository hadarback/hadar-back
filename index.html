<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הדר בק · מטפלת בעיסוי · באר שבע · לנשים בלבד</title>
<meta name="description" content="חוויית טיפול אישית ומקצועית לנשים בלבד. קליניקה נעימה ואינטימית בבאר שבע.">
<meta property="og:title" content="הדר בק · מטפלת בעיסוי">
<meta property="og:description" content="קליניקה נעימה ואינטימית בבאר שבע — מקום שקט לטפל בעצמך.">
<meta property="og:type" content="website">

<style>
:root{
  --bg:#EEF2EF;
  --bg-2:#E7EEE8;
  --card:#FFFFFF;
  --ink:#2F3A34;
  --ink-soft:#5C655F;
  --ink-quiet:#8A938C;
  --line:#E0E6E1;
  --primary:#4E6E5D;
  --primary-deep:#42604F;
  --primary-soft:rgba(78,110,93,.10);
  --accent:#6E9484;
  --green-bright:#4FA877;
  --display:'Rubik', ui-sans-serif, system-ui, sans-serif;
  --body:'Assistant', ui-sans-serif, system-ui, sans-serif;
  --shadow-btn:0 14px 30px -12px rgba(66,96,79,.45);
  --shadow-card:0 18px 40px -22px rgba(47,58,52,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--body);
  font-weight:400;line-height:1.65;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  min-height:100vh;display:flex;flex-direction:column;
  position:relative;overflow-x:hidden;
}
/* soft radial glow lower-center */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(70% 55% at 50% 78%, rgba(110,148,132,.20) 0%, transparent 60%),
    radial-gradient(90% 70% at 50% 120%, rgba(78,110,93,.16) 0%, transparent 55%);
}

main{
  flex:1;position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:3rem 1.5rem;
}
.hero{max-width:780px;width:100%;animation:rise .7s cubic-bezier(.2,.7,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.eyebrow{
  font-family:var(--body);font-weight:700;font-size:.9rem;
  letter-spacing:.06em;color:var(--accent);margin-bottom:1.4rem;
}
.title{
  font-family:var(--display);font-weight:800;
  font-size:clamp(2rem,8vw,4.4rem);line-height:1.1;
  letter-spacing:-.01em;color:var(--ink);margin-bottom:1.5rem;
  overflow-wrap:break-word;
}
@media (max-width:360px){ .title{font-size:1.7rem} .lead{font-size:1rem} }
.title .accent{color:var(--primary);display:block}
.lead{
  font-size:clamp(1.05rem,2.4vw,1.3rem);color:var(--ink-soft);
  max-width:30ch;margin:0 auto 2.8rem;line-height:1.7;font-weight:400;
}

.cta-row{
  display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:1.05rem 2rem;border-radius:9999px;
  font-family:var(--body);font-size:1.05rem;font-weight:700;
  cursor:pointer;text-decoration:none;border:1.5px solid transparent;
  transition:transform .25s cubic-bezier(.2,.7,.3,1), box-shadow .25s, background .2s, border-color .2s;
}
.btn svg{width:20px;height:20px;flex-shrink:0}
.btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-btn)}
.btn-primary:hover{background:var(--primary-deep);transform:translateY(-3px)}
.btn-ghost{background:var(--card);color:var(--ink);border-color:var(--line);box-shadow:0 6px 18px -12px rgba(47,58,52,.3)}
.btn-ghost:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-card)}
.btn-ghost .ic-green{color:var(--green-bright)}

footer{
  position:relative;z-index:1;
  padding:2rem 1.5rem 2.4rem;text-align:center;
}
.foot-info{
  display:inline-flex;align-items:center;gap:1.6rem;flex-wrap:wrap;justify-content:center;
  color:var(--ink-soft);font-size:.98rem;font-weight:600;margin-bottom:.8rem;
}
.foot-info a{color:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:.45rem;transition:color .2s}
.foot-info a:hover{color:var(--primary)}
.foot-info svg{width:17px;height:17px;color:var(--accent)}
.foot-copy{color:var(--ink-quiet);font-size:.85rem;font-weight:400}
.foot-admin{color:var(--ink-quiet);opacity:.45;font-size:.72rem;text-decoration:none;margin-top:.6rem;display:inline-block}

@media (max-width:560px){
  .cta-row{flex-direction:column;align-items:stretch}
  .btn{justify-content:center;width:100%}
  .foot-info{gap:.4rem;flex-direction:column}
}
</style>
</head>
<body>

  <div class="foot-copy">© 2026 הדר בק — כל הזכויות שמורות</div>

</body>
</html>
